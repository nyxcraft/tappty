name: Build and deploy docs to GitHub Pages

# Builds the static docs site (docs/*.md + gh-pages/) and publishes it via GitHub Pages.
# Set Settings -> Pages -> Source to "GitHub Actions" once; nothing is committed to the repo
# (the built site lives only in the Pages artifact -- gh-pages/public/ is gitignored).

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'CHANGELOG.md'
      - 'gh-pages/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install markdown-it-py
        run: pip install markdown-it-py
      - name: Build site
        run: python3 gh-pages/build_site.py
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: gh-pages/public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
