<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page_title }} | {{ site_name }}</title>
  <meta name="description" content="{{ page_summary }}">
  <link rel="stylesheet" href="{{ assets_href }}">
</head>
<body class="site-doc">
  <a class="skip-link" href="#main-content">Skip to main content</a>
  <div class="page-shell">
    <header class="site-header site-header--compact">
      <a class="brand" href="{{ home_href }}">
        <img class="brand__icon" src="{{ logo_href }}" alt="" aria-hidden="true">
        <span class="brand__name">{{ site_name }}</span>
      </a>
      <nav class="top-nav" aria-label="Primary">
        <a href="{{ github_href }}">GitHub</a>
        <a href="{{ docs_href }}">Docs</a>
      </nav>
    </header>

    <main id="main-content" class="docs-layout" tabindex="-1">
      <aside class="docs-sidebar">
        <p class="docs-sidebar__eyebrow">Docs</p>
        <nav class="docs-nav" aria-label="Documentation">
{{ docs_nav }}
        </nav>
      </aside>

      <article class="docs-article">
        <header class="docs-article__header">
          <p class="eyebrow">Documentation</p>
          <h1>{{ page_title }}</h1>
          <p class="docs-article__summary">{{ page_summary }}</p>
          <p class="docs-article__source">{{ source_title }}</p>
        </header>
{{ toc }}
        <div class="prose">
{{ content }}
        </div>
      </article>
    </main>
  </div>
</body>
</html>
