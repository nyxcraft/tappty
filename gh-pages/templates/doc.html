<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page_title }} | {{ site_name }}</title>
  <meta name="description" content="{{ page_summary }}">
  <link rel="stylesheet" href="{{ assets_href }}">
</head>
<body class="site-doc">
  <a class="skip-link" href="#main-content">Skip to main content</a>
  <div class="page-shell">
    <header class="site-header site-header--compact">
      <a class="brand" href="{{ home_href }}">
        <img class="brand__icon" src="{{ logo_href }}" alt="" aria-hidden="true">
        <span class="brand__name">{{ site_name }}</span>{{ status_badge }}
      </a>
      <nav class="top-nav" aria-label="Primary">
        <a href="{{ docs_href }}">Docs</a>
        <a href="{{ gallery_href }}">Gallery</a>
        <a href="{{ github_href }}">GitHub</a>
      </nav>
    </header>

    <nav class="breadcrumbs" aria-label="Breadcrumb">
      <a href="{{ home_href }}">Home</a>
      <span class="breadcrumbs__sep" aria-hidden="true">›</span>
      <span aria-current="page">{{ page_title }}</span>
    </nav>

    <main id="main-content" class="docs-layout" tabindex="-1">
      <aside class="docs-sidebar">
        <p class="docs-sidebar__eyebrow">On this page</p>
        <nav class="section-nav" aria-label="On this page">
{{ toc }}
        </nav>
      </aside>

      <article class="docs-article">
        <header class="docs-article__header">
          <p class="eyebrow">Documentation</p>
          <h1>{{ page_title }}</h1>
          <p class="docs-article__summary">{{ page_summary }}</p>
          <p class="docs-article__source">{{ source_title }}</p>
        </header>
        <div class="prose">
{{ content }}
        </div>
      </article>
    </main>

    <footer class="site-footer">
      <p>© {{ year }} {{ copyright }} · <a href="{{ home_href }}">{{ site_name }}</a> is <a href="{{ license_href }}">MIT-licensed</a>.</p>
      {{ attribution }}
    </footer>
  </div>

  <script>
  // Section viewer: split the page into one panel per H2 and show one at a time, driven by the
  // left-rail "On this page" links (and any in-prose # link). Degrades to the full page when
  // JavaScript is off -- the panels are only hidden once .js-sections is set here.
  (function () {
    var prose = document.querySelector('.prose');
    if (!prose) return;
    var navLinks = Array.prototype.slice.call(document.querySelectorAll('.section-nav a[href^="#"]'));

    var kids = Array.prototype.slice.call(prose.childNodes);
    var groups = [], preface = [], cur = null;
    kids.forEach(function (n) {
      if (n.nodeType === 1 && n.tagName === 'H2') { cur = { id: n.id, nodes: [n] }; groups.push(cur); }
      else if (cur) { cur.nodes.push(n); }
      else { preface.push(n); }
    });
    if (!groups.length) return;                 // no H2s -> leave the page as one scroll
    groups[0].nodes = preface.concat(groups[0].nodes);

    prose.innerHTML = '';
    prose.classList.add('js-sections');
    var anchorToSection = {};
    var sections = groups.map(function (g) {
      var s = document.createElement('section');
      s.className = 'doc-section';
      g.nodes.forEach(function (n) { s.appendChild(n); });
      prose.appendChild(s);
      Array.prototype.forEach.call(s.querySelectorAll('[id]'), function (el) { anchorToSection[el.id] = s; });
      if (g.id) anchorToSection[g.id] = s;
      return s;
    });

    function activate(anchor, scroll) {
      var target = anchorToSection[anchor] || sections[0];
      sections.forEach(function (s) { s.classList.toggle('is-active', s === target); });
      navLinks.forEach(function (a) {
        var id = decodeURIComponent(a.getAttribute('href').slice(1));
        a.classList.toggle('is-active', anchorToSection[id] === target);
      });
      if (scroll) {
        var el = (anchor && document.getElementById(anchor)) || target;
        if (el && el.scrollIntoView) el.scrollIntoView({ block: 'start', behavior: 'smooth' });
      }
    }
    function fromHash(scroll) { activate(decodeURIComponent((location.hash || '').slice(1)), scroll); }

    document.addEventListener('click', function (e) {
      var a = e.target && e.target.closest ? e.target.closest('a[href^="#"]') : null;
      if (!a) return;
      var id = decodeURIComponent(a.getAttribute('href').slice(1));
      if (anchorToSection[id]) activate(id, true);
    });
    window.addEventListener('hashchange', function () { fromHash(true); });
    fromHash(false);
  })();
  </script>
</body>
</html>
